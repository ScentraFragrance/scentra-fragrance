<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Discover the best luxury perfume collection at Scentra. Shop your favorite scents and enjoy premium fragrances in Egypt.">
    <title>Scentra - Fragrance Details</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px; transition: 0.3s; }
        body.light-mode { background: #f4f4f4; color: #333; }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .back-btn { cursor: pointer; color: #d4af37; font-weight: bold; border: 1px solid #d4af37; padding: 10px 20px; border-radius: 8px; transition: 0.3s; }
        .back-btn:hover { background: #d4af37; color: #000; }
        .cart-icon { cursor: pointer; font-size: 35px; transition: 0.4s; }
        .cart-icon:hover { transform: scale(1.2); }

        .container { display: flex; gap: 50px; }
        .img-box { width: 450px; height: 550px; border-radius: 20px; object-fit: cover; border: 2px solid #333; }
        
        .info-card { background: #111; padding: 30px; border-radius: 20px; border-left: 6px solid #d4af37; margin-bottom: 25px; line-height: 1.6; }
        body.light-mode .info-card { background: #fff; border: 1px solid #ddd; }

        .price-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .price-card { flex: 1; border: 2px solid #444; padding: 20px; border-radius: 15px; cursor: pointer; text-align: center; background: #111; transition: 0.4s ease; }
        .price-card:hover { transform: translateY(-10px); border-color: #d4af37; box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
        .price-card.selected { border-color: #d4af37; transform: scale(1.05); background: #222; }
        body.light-mode .price-card { background: #fff; border: 1px solid #ddd; }

        .add-btn { background: #d4af37; color: #000; padding: 20px; border: none; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; font-size: 1.3em; transition: 0.3s; }
        .add-btn:hover { background: #b8962d; }
        
        #toast { position: fixed; top: 20px; right: -400px; background: #d4af37; color: #000; padding: 15px 25px; border-radius: 10px; font-weight: bold; transition: 0.5s; z-index: 1000; }
        #toast.show { right: 20px; }
    </style>
</head>
<body>

    <script>
        if(localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); }
    </script>
    
    <div id="toast">Added to Cart Successfully! ✅😊</div>

    <div class="top-nav">
        <div class="back-btn" onclick="location.href='index.html'">← Back to Store</div>
        <div class="cart-icon" onclick="location.href='cart.html'">🛒</div>
    </div>

    <div class="container">
        <img id="p-img" class="img-box" src="" alt="Perfume">
        <div style="flex: 1;">
            <h1 id="p-name">Loading...</h1>
            <div class="info-card">
                <h3 style="color:#d4af37;">Fragrance Notes & Profile</h3>
                <p id="p-desc"></p>
                <h3 style="color:#d4af37;">Performance & Sillage</h3>
                <p id="p-perf"></p>
            </div>
            <div class="price-grid">
                <div class="price-card selected" id="c1" onclick="select(600, 'With Box', 'c1')"><h3>600 EGP</h3><p>With Box</p></div>
                <div class="price-card" id="c2" onclick="select(500, 'Without Box', 'c2')"><h3>500 EGP</h3><p>Without Box</p></div>
            </div>
            <button class="add-btn" onclick="addToCart()">ADD TO CART 🛒</button>
        </div>
    </div>

    <script>
        const info = {
            1: {name: "Stronger With You", img: "images/perfume 1.jpg", desc: "Warm and spicy with Cardamom and Vanilla.", perf: "8-10 hours, strong."},
            2: {name: "Sauvage", img: "images/perfume 2.jpg", desc: "Fresh Bergamot and Pepper.", perf: "8-9 hours, beast mode."},
            3: {name: "Valentino", img: "images/perfume 3.webp", desc: "Ginger, Iris, and Leather.", perf: "7-8 hours, sophisticated."},
            4: {name: "Eclaire", img: "images/perfume 4.webp", desc: "Caramel, Pear, and Vanilla.", perf: "6-7 hours, gourmand."},
            5: {name: "Versace Eros", img: "images/perfume 5.webp", desc: "Mint, Green Apple, and Tonka Bean.", perf: "8+ hours, vibrant."},
            6: {name: "Myself", img: "images/perfume 6.webp", desc: "Bergamot and Patchouli.", perf: "7-8 hours, crisp."},
            7: {name: "Libre", img: "images/perfume 7.jpg", desc: "Lavender and Orange Blossom.", perf: "8+ hours, elegant."},
            8: {name: "Burberry", img: "images/perfume 8.jpg", desc: "Mint and Lavender.", perf: "6-7 hours, classic."},
            9: {name: "Xerjoff", img: "images/perfume 9.webp", desc: "Lemon and intense Amber.", perf: "10+ hours, luxurious."},
            10: {name: "Wild Colt", img: "images/perfume 10.webp", desc: "Leather and Oud.", perf: "9+ hours, bold."},
            11: {name: "Acqua Di Gio", img: "images/perfume 11.webp", desc: "Marine notes and Lime.", perf: "5-6 hours, refreshing."},
            12: {name: "Jean Paul", img: "images/perfume 12.webp", desc: "Mint and Cinnamon.", perf: "8-9 hours, sweet."},
            13: {name: "Ombre Nomade", img: "images/perfume 13.webp", desc: "Raspberry, Rose, and smoky Oud.", perf: "12+ hours, beast."},
            14: {name: "Assaf Garden Musk", img: "images/perfume 14.jpeg", desc: "Soft clean musk.", perf: "6-7 hours, soothing."},
            15: {name: "Black Afgano", img: "images/perfume 15.jpeg", desc: "Incense, Coffee, and Oud.", perf: "10+ hours, dark."},
            16: {name: "LV Moon Tale", img: "images/perfume 16.jpeg", desc: "Night-blooming flowers.", perf: "8-9 hours, whimsical."},
            17: {name: "Dominican Tobacco", img: "images/perfume 17.jpeg", desc: "Tobacco leaf and warm spices.", perf: "9-10 hours, rugged."},
            18: {name: "Lattafa Sehr", img: "images/perfume 18.jpeg", desc: "Rich oriental spices.", perf: "10+ hours, powerful."},
            19: {name: "Black Carbon Diamond", img: "images/perfume 19.jpeg", desc: "Mineral facets and woods.", perf: "8-9 hours, modern."},
            20: {name: "Yara Candy", img: "images/perfume 20.jpeg", desc: "Caramel and red fruits.", perf: "6-7 hours, playful."},
            21: {name: "Yara Original", img: "images/perfume 21.jpeg", desc: "Tropical fruits and Vanilla.", perf: "7-8 hours, creamy."},
            22: {name: "Mexican Tobacco", img: "images/perfume 22.jpeg", desc: "Smoky, spicy tobacco.", perf: "9+ hours, intense."},
            23: {name: "Tom Ford Tobacco Vanille", img: "images/perfume 23.jpeg", desc: "Tobacco leaf and cocoa.", perf: "10-12 hours, opulent."},
            24: {name: "Stronger With You Tobacco", img: "images/perfume 24.jpeg", desc: "Smoky sweet tobacco twist.", perf: "9+ hours, cozy."},
            25: {name: "Xerjoff More Than Words", img: "images/perfume 26.jpeg", desc: "Rose, Oud, and Amber.", perf: "12+ hours, poetic."},
            26: {name: "Bleu de Chanel", img: "images/perfume 25.jpeg", desc: "Woody and aromatic.", perf: "8-9 hours, professional."},
            27: {name: "Valentino Donna", img: "images/perfume 27.jpeg", desc: "Jasmine and Vanilla.", perf: "7-8 hours, feminine."},
            28: {name: "Stronger With You Intensely", img: "images/perfume28.jpg", desc: "Pink pepper, cinnamon, and lavender.", perf: "9-10 hours, intense."},
            29: {name: "YSL Y Men", img: "images/perfume29.jpeg", desc: "Ginger, sage, and apple.", perf: "8-9 hours, fresh."},
            30: {name: "YSL Libre Berry", img: "images/perfume30.jpeg", desc: "Lavender, orange blossom, and red berries.", perf: "8+ hours, floral."},
            31: {name: "Valentino Born In Roma", img: "images/perfume31.jpeg", desc: "Blackcurrant, bergamot, and bourbon vanilla.", perf: "7-8 hours, modern."},
            32: {name: "YSL Libre", img: "images/perfume32.jpeg", desc: "Mandarin oil, lavender, and musk accord.", perf: "8+ hours, sophisticated."},
            33: {name: "Si Passione Eclat", img: "images/perfume33.jpeg", desc: "Blackcurrant, bergamot, and rose.", perf: "6-7 hours, vibrant."},
            34: {name: "Prada Paradoxe", img: "images/perfume34.jpeg", desc: "Pear, tangerine, and white flowers.", perf: "7-8 hours, feminine."},
            35: {name: "Miss Dior", img: "images/perfume35.jpeg", desc: "Sweet floral notes and soft musk.", perf: "6-7 hours, elegant."},
            36: {name: "La Vie Est Belle", img: "images/perfume36.jpeg", desc: "Iris, patchouli, and spun sugar.", perf: "8+ hours, sweet."}
        };

        const id = new URLSearchParams(window.location.search).get('id');
        const p = info[id];
        let price = 600; let type = 'With Box';

        if(p) {
            document.getElementById('p-name').innerText = p.name;
            document.getElementById('p-img').src = p.img;
            document.getElementById('p-desc').innerText = p.desc;
            document.getElementById('p-perf').innerText = p.perf;
        }

        function select(pr, ty, id) {
            price = pr; type = ty;
            document.querySelectorAll('.price-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(id).classList.add('selected');
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push({name: p.name, price: price, type: type, img: p.img});
            localStorage.setItem('cart', JSON.stringify(cart));
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
