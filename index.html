<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="description" content="Discover the best luxury perfume collection at Scentra. Shop your favorite scents and enjoy premium fragrances in Egypt.">
    <title>Scentra - Luxury Fragrances In Egypt </title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; transition: 0.3s; }
        body.light-mode { background: #f4f4f4; color: #333; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: #111; border-radius: 15px; 
            margin-bottom: 30px; border: 1px solid #333; gap: 15px;
        }
        body.light-mode header { background: #fff; border: 1px solid #ddd; }
        
        .brand { color: #d4af37; font-size: 24px; font-weight: bold; white-space: nowrap; }
        
        .search-bar { 
            padding: 10px; border-radius: 20px; border: 1px solid #444; 
            background: #222; color: #fff; flex-grow: 1; outline: none; margin: 0 15px;
        }
        body.light-mode .search-bar { background: #eee; border: 1px solid #ccc; color: #333; }
        
        .controls { display: flex; gap: 15px; align-items: center; }
        .theme-toggle { 
            background: #222; border: 2px solid #d4af37; padding: 8px 15px; 
            border-radius: 30px; cursor: pointer; color: #d4af37; font-weight: bold; transition: 0.3s;
        }
        .theme-toggle:hover { background: #d4af37; color: #000; }
        
        .cart-container { position: relative; cursor: pointer; display: flex; align-items: center; }
        .cart-icon { font-size: 28px; transition: 0.3s; }
        .cart-icon:hover { transform: scale(1.2); }
        #cart-count { 
            position: absolute; top: -5px; right: -10px; background: #ff4d4d; color: white; 
            border-radius: 50%; padding: 2px 7px; font-size: 12px; font-weight: bold; display: none; 
        }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card { background: #111; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #333; transition: 0.4s; cursor: pointer; }
        body.light-mode .card { background: #fff; border: 1px solid #ddd; }
        .card:hover { transform: translateY(-10px); border-color: #d4af37; box-shadow: 0 10px 20px rgba(212,175,55,0.3); }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 10px; }
        .card h3 { margin-top: 15px; color: #d4af37; }
    </style>
</head>
<body>

    <header>
        <div class="brand">Scentra</div>
        <input type="text" class="search-bar" id="search" placeholder="Search for perfumes..." onkeyup="searchPerfume()">
        <div class="controls">
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
            <div class="cart-container" onclick="location.href='cart.html'">
                <div class="cart-icon">🛒</div>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <div class="grid" id="perfume-grid">
        <!-- الـ JavaScript هيملا المكان ده أوتوماتيكياً -->
    </div>

    <script>
        const products = [
            { id: 1, name: "Stronger With You", img: "images/perfume 1.jpg" },
            { id: 2, name: "Sauvage", img: "images/perfume 2.jpg" },
            { id: 3, name: "Valentino", img: "images/perfume 3.webp" },
            { id: 4, name: "Eclaire", img: "images/perfume 4.webp" },
            { id: 5, name: "Versace Eros", img: "images/perfume 5.webp" },
            { id: 6, name: "Myself", img: "images/perfume 6.webp" },
            { id: 7, name: "Libre", img: "images/perfume 7.jpg" },
            { id: 8, name: "Burberry", img: "images/perfume 8.jpg" },
            { id: 9, name: "Xerjoff", img: "images/perfume 9.webp" },
            { id: 10, name: "Wild Colt", img: "images/perfume 10.webp" },
            { id: 11, name: "Acqua Di Gio", img: "images/perfume 11.webp" },
            { id: 12, name: "Jean Paul", img: "images/perfume 12.webp" },
            { id: 13, name: "Ombre Nomade", img: "images/perfume 13.webp" },
            { id: 14, name: "Assaf Garden Musk", img: "images/perfume 14.jpeg" },
            { id: 15, name: "Black Afgano", img: "images/perfume 15.jpeg" },
            { id: 16, name: "LV Moon Tale", img: "images/perfume 16.jpeg" },
            { id: 17, name: "Dominican Tobacco", img: "images/perfume 17.jpeg" },
            { id: 18, name: "Lattafa Sehr", img: "images/perfume 18.jpeg" },
            { id: 19, name: "Black Carbon Diamond", img: "images/perfume 19.jpeg" },
            { id: 20, name: "Yara Candy", img: "images/perfume 20.jpeg" },
            { id: 21, name: "Yara Original", img: "images/perfume 21.jpeg" },
            { id: 22, name: "Mexican Tobacco", img: "images/perfume 22.jpeg" },
            { id: 23, name: "Tom Ford Tobacco Vanille", img: "images/perfume 23.jpeg" },
            { id: 24, name: "Stronger With You Tobacco", img: "images/perfume 24.jpeg" },
            { id: 25, name: "Xerjoff More Than Words", img: "images/perfume 26.jpeg" },
            { id: 26, name: "Bleu de Chanel", img: "images/perfume 25.jpeg" },
            { id: 27, name: "Valentino Donna", img: "images/perfume 27.jpeg" }
        ];

        const grid = document.getElementById('perfume-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="card" onclick="location.href='product.html?id=${p.id}'">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                </div>
            `;
        });

        function searchPerfume() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "" : "none";
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }
        if(localStorage.getItem('theme') === 'light') { document.body.classList.add('light-mode'); }

        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            let countElement = document.getElementById('cart-count');
            if (cart.length > 0) {
                countElement.innerText = cart.length;
                countElement.style.display = 'block';
            } else {
                countElement.style.display = 'none';
            }
        }
        updateCartCount();
    </script>
</body>
</html>
